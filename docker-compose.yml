services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/sxmmie}/app:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-app_db}
      REDIS_URL: redis://redis:6379
      SERVER_ADDRESS: 0.0.0.0:7878
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:15
    container_name: axum_postgres_db
    environment:
      POSTGRES_USER: axum_postgres
      POSTGRES_PASSWORD: adminPass
      POSTGRES_DB: axum_postgres_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: axum_postgres_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
    ports:
      - "7878:7878"
    depends_on:
      - postgres

volumes:
  postgres_data:
